<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Смяна на парола | Lixby</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    .password-page {
      padding: 34px 0 84px;
      min-height: 70vh;
    }

    .password-card {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 18px;
      box-shadow: var(--shadow-soft);
      padding: 18px;
      max-width: 520px;
      margin: 0 auto;
      display: grid;
      gap: 14px;
    }

    .status-msg {
      border-radius: 12px;
      padding: 10px 12px;
      border: 1px solid #bfdbfe;
      background: #eff6ff;
      color: #1d4ed8;
      font-weight: 600;
    }

    .status-msg.error {
      border-color: #fecaca;
      background: #fef2f2;
      color: #b91c1c;
    }

    .status-msg.success {
      border-color: #a7f3d0;
      background: #ecfdf5;
      color: #047857;
    }

    .field {
      display: grid;
      gap: 6px;
    }

    .field label {
      font-size: 0.92rem;
      font-weight: 700;
    }

    .field input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 9px 11px;
      font: inherit;
      background: #f8fafc;
      color: #111827;
    }

    .helper {
      color: var(--muted);
      font-size: 0.9rem;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
  </style>
  <link rel="icon" type="image/png" href="images/favicon.png">
</head>
<body>
  <header class="nav" id="nav">
    <div class="container nav-container">
      <a href="./" class="nav-brand">Lixby</a>
      <nav class="nav-links" aria-label="Основна">
        <a href="магазин.html" class="nav-link">Магазин</a>
        <a href="#productos" class="nav-link">Продукти</a>
        <a href="#apps" class="nav-link">Приложения</a>
        <a href="поддръжка.html" class="nav-link">Поддръжка</a>
      </nav>
      <div class="nav-actions">
        <button type="button" class="nav-icon-button nav-search-toggle" aria-label="Търсене" aria-controls="navMobilePanel" aria-expanded="false">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="11" cy="11" r="7"></circle>
            <line x1="16.65" y1="16.65" x2="21" y2="21"></line>
          </svg>
        </button>
        <form id="navSearchForm" action="магазин.html" method="get">
          <input
            type="search"
            id="navSearch"
            name="q"
            class="nav-search"
            placeholder="Търси продукт..."
            aria-label="Търси продукт"
          >
        </form>
        <a href="кошница.html" class="nav-icon-link" aria-label="Кошница">
          <img src="images/Bolsa.png" alt="Кошница">
        </a>
        <a href="профил.html" class="nav-icon-link" aria-label="Профил">
          <img src="images/cuenta.png" alt="Профил">
        </a>
        <button type="button" class="nav-icon-button nav-menu-toggle" aria-label="Меню" aria-controls="navMobilePanel" aria-expanded="false">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <line x1="3" y1="6" x2="21" y2="6"></line>
            <line x1="3" y1="12" x2="21" y2="12"></line>
            <line x1="3" y1="18" x2="21" y2="18"></line>
          </svg>
        </button>
      </div>
    </div>
  </header>
  <div class="nav-mobile-panel" id="navMobilePanel" aria-hidden="true">
    <div class="nav-mobile-top">
      <form id="navSearchFormMobile" class="nav-search-form-mobile" action="магазин.html" method="get">
        <input
          type="search"
          id="navSearchMobile"
          name="q"
          class="nav-search-mobile"
          placeholder="Търсене"
          aria-label="Търси продукт"
        >
      </form>
      <button type="button" class="nav-mobile-close" aria-label="Затвори меню">
        <span aria-hidden="true">✕</span>
      </button>
    </div>
    <nav class="nav-mobile-links" aria-label="Основно мобилно">
      <a href="магазин.html">Магазин</a>
      <a href="#productos">Продукти</a>
      <a href="#apps">Приложения</a>
      <a href="поддръжка.html">Поддръжка</a>
    </nav>
    <div class="nav-mobile-actions">
      <a href="кошница.html">Кошница</a>
      <a href="профил.html">Профил</a>
    </div>
  </div>

  <main class="container password-page">
    <div id="statusMsg" class="status-msg"></div>

    <section class="password-card">
      <h1>Смяна на парола</h1>
      <p class="helper">За вашата сигурност, моля въведете текущата си парола.</p>

      <div class="field">
        <label for="currentPassword">Текуща парола</label>
        <input id="currentPassword" type="password" autocomplete="current-password">
      </div>
      <div class="field">
        <label for="newPassword">Нова парола</label>
        <input id="newPassword" type="password" autocomplete="new-password">
      </div>
      <div class="field">
        <label for="confirmPassword">Потвърди новата парола</label>
        <input id="confirmPassword" type="password" autocomplete="new-password">
      </div>

      <div class="actions">
        <button id="savePasswordBtn" class="btn btn-primary" type="button">Запази промените</button>
        <a class="btn btn-secondary" href="профил.html">Обратно към профила</a>
      </div>
    </section>
  </main>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, onAuthStateChanged, updatePassword, EmailAuthProvider, reauthenticateWithCredential } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCPU-jsIupu3lsRrknmlv04A3YnBwXeePU",
      authDomain: "lixby0.firebaseapp.com",
      projectId: "lixby0",
      storageBucket: "lixby0.firebasestorage.app",
      messagingSenderId: "1058088945026",
      appId: "1:1058088945026:web:c56eaa9c71f1ca625fbb9b",
      measurementId: "G-689VDV93C2"
    };

    const statusMsg = document.getElementById("statusMsg");
    const currentPassword = document.getElementById("currentPassword");
    const newPassword = document.getElementById("newPassword");
    const confirmPassword = document.getElementById("confirmPassword");
    const savePasswordBtn = document.getElementById("savePasswordBtn");

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    function showStatus(text, type = "") {
      statusMsg.textContent = text;
      statusMsg.className = `status-msg ${type}`.trim();
    }

    function clearInputs() {
      currentPassword.value = "";
      newPassword.value = "";
      confirmPassword.value = "";
    }

    function isStrongEnough(value) {
      return value.length >= 8;
    }

    onAuthStateChanged(auth, (user) => {
      if (!user) {
        window.location.href = "вход.html";
      }
    });

    savePasswordBtn.addEventListener("click", async () => {
      const user = auth.currentUser;
      if (!user || !user.email) {
        showStatus("Невалидна сесия.", "error");
        return;
      }

      const current = currentPassword.value.trim();
      const next = newPassword.value.trim();
      const confirm = confirmPassword.value.trim();

      if (!current) {
        showStatus("Въведи текуща парола.", "error");
        return;
      }

      if (!isStrongEnough(next)) {
        showStatus("Новата парола трябва да съдържа поне 8 символа.", "error");
        return;
      }

      if (next !== confirm) {
        showStatus("Паролите не съвпадат.", "error");
        return;
      }

      try {
        const credential = EmailAuthProvider.credential(user.email, current);
        await reauthenticateWithCredential(user, credential);
        await updatePassword(user, next);
        clearInputs();
        showStatus("Паролата е актуализирана успешно.", "success");
      } catch (error) {
        showStatus(`Неуспешна актуализация: ${error.message}`, "error");
      }
    });
  </script>
</body>
</html>
