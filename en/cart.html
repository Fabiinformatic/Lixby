  <style>
    .cart-page {
      padding: 36px 0 70px;
    }

    .cart-head {
      margin-bottom: 24px;
    }

    .cart-head h1 {
      font-size: clamp(1.9rem, 5vw, 3rem);
      letter-spacing: -0.03em;
      margin-bottom: 6px;
    }

    .cart-layout {
      display: grid;
      grid-template-columns: 1.5fr 0.9fr;
      gap: 20px;
      align-items: start;
    }

    .cart-list,
    .cart-summary {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 18px;
      box-shadow: var(--shadow-soft);
    }

    .cart-item {
      display: grid;
      grid-template-columns: 90px 1fr auto;
      gap: 14px;
      padding: 12px 0;
      border-bottom: 1px solid var(--line);
      align-items: center;
    }

    .cart-item:last-child {
      border-bottom: 0;
    }

    .cart-item-image {
      width: 90px;
      height: 90px;
      object-fit: cover;
      border-radius: 12px;
      border: 1px solid var(--line);
    }

    .cart-item h3 {
      margin-bottom: 4px;
      font-size: 1.15rem;
    }

    .cart-controls {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-top: 8px;
    }

    .cart-controls button {
      width: 30px;
      height: 30px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: #fff;
      cursor: pointer;
      font-weight: 700;
    }

    .cart-remove {
      border: 0;
      background: transparent;
      color: #b91c1c;
      cursor: pointer;
      font-weight: 700;
      text-decoration: underline;
      padding: 0;
      margin-top: 8px;
    }

    .cart-item-total {
      font-weight: 800;
      white-space: nowrap;
    }

    .cart-summary h2 {
      font-size: 1.25rem;
      margin-bottom: 14px;
    }

    .cart-row {
      display: flex;
      justify-content: space-between;
      margin: 8px 0;
    }

    .cart-total {
      border-top: 1px solid var(--line);
      margin-top: 12px;
      padding-top: 12px;
      font-weight: 800;
      font-size: 1.1rem;
    }

    .cart-actions {
      margin-top: 16px;
      display: grid;
      gap: 10px;
    }

    .cart-actions .btn {
      width: 100%;
      min-height: 48px;
      font-size: 1rem;
      letter-spacing: 0.01em;
    }

    .cart-actions .btn:active {
      transform: translateY(1px) scale(0.99);
    }

    .cart-actions .btn:focus-visible {
      outline: 3px solid rgba(22, 167, 255, 0.35);
      outline-offset: 2px;
    }

    .cart-empty {
      color: var(--muted);
    }

    @media (max-width: 900px) {
      .cart-layout {
        grid-template-columns: 1fr;
      }
    }
  </style>

  <main class="container cart-page">
    <section class="cart-head">
      <h1>Your cart</h1>
      <p>Review your products before completing the purchase.</p>
    </section>

    <section class="cart-layout">
      <div class="cart-list" id="cartList"></div>

      <aside class="cart-summary">
        <h2>Summary</h2>
        <div class="cart-row"><span>Subtotal</span><span id="subtotal">0 EUR</span></div>
        <div class="cart-row"><span>Shipping</span><span>Free</span></div>
        <div class="cart-row cart-total"><span>Total</span><span id="total">0 EUR</span></div>
        <div class="cart-actions">
          <button id="checkoutBtn" class="btn btn-primary" type="button">Checkout</button>
          <button id="clearCartBtn" class="btn btn-secondary" type="button">Clear cart</button>
        </div>
      </aside>
    </section>
  </main>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const STRIPE_PAYMENT_LINK = "https://buy.stripe.com/fZubIU2Hz3Ob1B12LV4ZG00";
    const CHECKOUT_ENDPOINT = "/create-checkout-session";
    const SUCCESS_URL = new URL("thank-you.html", window.location.href).toString();
    const CANCEL_URL = window.location.href;

    const firebaseConfig = {
      apiKey: "AIzaSyCPU-jsIupu3lsRrknmlv04A3YnBwXeePU",
      authDomain: "lixby0.firebaseapp.com",
      projectId: "lixby0",
      storageBucket: "lixby0.firebasestorage.app",
      messagingSenderId: "1058088945026",
      appId: "1:1058088945026:web:c56eaa9c71f1ca625fbb9b",
      measurementId: "G-689VDV93C2"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    let authReady = false;
    let isAuthenticated = false;

    onAuthStateChanged(auth, (user) => {
      authReady = true;
      isAuthenticated = Boolean(user);
    });

    const CART_KEY = "lixbyCart";
    const LAST_ORDER_KEY = "lixbyLastOrder";

    const productCatalog = {
      "lixbuds-one": {
        id: "lixbuds-one",
        name: "LixBuds One",
        price: 99.99,
        image: "images/lixbuds-product.jpg"
      }
    };

    const cartListEl = document.getElementById("cartList");
    const subtotalEl = document.getElementById("subtotal");
    const totalEl = document.getElementById("total");
    const clearCartBtn = document.getElementById("clearCartBtn");
    const checkoutBtn = document.getElementById("checkoutBtn");

    function readCart() {
      return JSON.parse(localStorage.getItem(CART_KEY) || "[]");
    }

    function writeCart(cart) {
      localStorage.setItem(CART_KEY, JSON.stringify(cart));
    }

    function money(value) {
      return `${value} EUR`;
    }

    function generateOrderId() {
      const now = new Date();
      const yyyy = now.getFullYear();
      const mm = String(now.getMonth() + 1).padStart(2, "0");
      const dd = String(now.getDate()).padStart(2, "0");
      const rand = Math.floor(1000 + Math.random() * 9000);
      return `LX-${yyyy}${mm}${dd}-${rand}`;
    }

    function calculateSummary(cart) {
      let subtotal = 0;
      const items = cart.map((entry) => {
        const product = productCatalog[entry.id] || {
          id: entry.id,
          name: entry.name || "Product",
          price: Number(entry.price) || 0,
          image: "images/lixbuds-hero.jpg"
        };
        const qty = Number(entry.qty) || 1;
        const lineTotal = product.price * qty;
        subtotal += lineTotal;

        return {
          id: product.id,
          name: product.name,
          price: product.price,
          qty,
          lineTotal
        };
      });

      return { items, subtotal };
    }

    function updateQuantity(productId, delta) {
      const cart = readCart();
      const item = cart.find((entry) => entry.id === productId);
      if (!item) return;

      item.qty += delta;
      if (item.qty <= 0) {
        const next = cart.filter((entry) => entry.id !== productId);
        writeCart(next);
      } else {
        writeCart(cart);
      }

      renderCart();
    }

    function removeItem(productId) {
      const next = readCart().filter((entry) => entry.id !== productId);
      writeCart(next);
      renderCart();
    }

    function renderCart() {
      const cart = readCart();

      if (cart.length === 0) {
        cartListEl.innerHTML = `<p class="cart-empty">Your cart is empty. <a href="shop.html">Go to shop</a>.</p>`;
        subtotalEl.textContent = "0 EUR";
        totalEl.textContent = "0 EUR";
        return;
      }

      let subtotal = 0;

      cartListEl.innerHTML = cart.map((entry) => {
        const product = productCatalog[entry.id] || {
          id: entry.id,
          name: entry.name || "Product",
          price: Number(entry.price) || 0,
          image: "images/lixbuds-hero.jpg"
        };

        const qty = Number(entry.qty) || 1;
        const lineTotal = product.price * qty;
        subtotal += lineTotal;

        return `
          <article class="cart-item">
            <img class="cart-item-image" src="${product.image}" alt="${product.name}">
            <div>
              <h3>${product.name}</h3>
              <p>${money(product.price)} / unit</p>
              <div class="cart-controls">
                <button type="button" data-action="minus" data-id="${product.id}">-</button>
                <span>${qty}</span>
                <button type="button" data-action="plus" data-id="${product.id}">+</button>
              </div>
              <button type="button" class="cart-remove" data-action="remove" data-id="${product.id}">Remove</button>
            </div>
            <div class="cart-item-total">${money(lineTotal)}</div>
          </article>
        `;
      }).join("");

      subtotalEl.textContent = money(subtotal);
      totalEl.textContent = money(subtotal);
    }

    cartListEl.addEventListener("click", (event) => {
      const target = event.target;
      if (!(target instanceof HTMLElement)) return;

      const action = target.getAttribute("data-action");
      const productId = target.getAttribute("data-id");
      if (!action || !productId) return;

      if (action === "plus") updateQuantity(productId, 1);
      if (action === "minus") updateQuantity(productId, -1);
      if (action === "remove") removeItem(productId);
    });

    clearCartBtn.addEventListener("click", () => {
      localStorage.removeItem(CART_KEY);
      renderCart();
    });

    checkoutBtn.addEventListener("click", async () => {
      const cart = readCart();
      if (cart.length === 0) {
        alert("Your cart is empty.");
        return;
      }

      if (!authReady) {
        alert("Loading session. Try again in a few seconds.");
        return;
      }

      if (!isAuthenticated) {
        window.location.href = "sign-in.html";
        return;
      }

      const orderId = generateOrderId();
      const summary = calculateSummary(cart);
      const orderPayload = {
        orderId,
        status: "pending_payment",
        paymentStatus: "pending",
        currency: "EUR",
        subtotal: Number(summary.subtotal.toFixed(2)),
        items: summary.items,
        createdAt: serverTimestamp(),
        uid: auth.currentUser?.uid || null
      };

      localStorage.setItem(LAST_ORDER_KEY, JSON.stringify({
        orderId,
        status: orderPayload.status,
        currency: orderPayload.currency,
        subtotal: orderPayload.subtotal,
        items: orderPayload.items
      }));

      try {
        await addDoc(collection(db, "orders"), orderPayload);
      } catch (error) {
        console.log("Order save failed", error);
      }

      try {
        const response = await fetch(CHECKOUT_ENDPOINT, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            orderId,
            successUrl: SUCCESS_URL,
            cancelUrl: CANCEL_URL
          })
        });
        const data = await response.json();
        if (response.ok && data.url) {
          window.location.href = data.url;
          return;
        }
      } catch (error) {
        console.log("Checkout session failed", error);
      }

      window.location.href = STRIPE_PAYMENT_LINK;
    });

    renderCart();
  </script>
</body>
