  <style>
    .cart-page {
      padding: 36px 0 70px;
    }

    .cart-head {
      margin-bottom: 24px;
    }

    .cart-head h1 {
      font-size: clamp(1.9rem, 5vw, 3rem);
      letter-spacing: -0.03em;
      margin-bottom: 6px;
    }

    .cart-layout {
      display: grid;
      grid-template-columns: 1.5fr 0.9fr;
      gap: 20px;
      align-items: start;
    }

    .cart-list,
    .cart-summary {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 18px;
      box-shadow: var(--shadow-soft);
    }

    .cart-item {
      display: grid;
      grid-template-columns: 90px 1fr auto;
      gap: 14px;
      padding: 12px 0;
      border-bottom: 1px solid var(--line);
      align-items: center;
    }

    .cart-item:last-child {
      border-bottom: 0;
    }

    .cart-item-image {
      width: 90px;
      height: 90px;
      object-fit: cover;
      border-radius: 12px;
      border: 1px solid var(--line);
    }

    .cart-item h3 {
      margin-bottom: 4px;
      font-size: 1.15rem;
    }

    .cart-item-meta {
      color: var(--muted);
      font-size: 0.95rem;
      margin-top: 4px;
    }

    .cart-controls {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-top: 8px;
    }

    .cart-controls button {
      width: 30px;
      height: 30px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: #fff;
      cursor: pointer;
      font-weight: 700;
    }

    .cart-remove {
      border: 0;
      background: transparent;
      color: #b91c1c;
      cursor: pointer;
      font-weight: 700;
      text-decoration: underline;
      padding: 0;
      margin-top: 8px;
    }

    .cart-item-total {
      font-weight: 800;
      white-space: nowrap;
    }

    .cart-summary h2 {
      font-size: 1.25rem;
      margin-bottom: 14px;
    }

    .cart-row {
      display: flex;
      justify-content: space-between;
      margin: 8px 0;
    }

    .cart-total {
      border-top: 1px solid var(--line);
      margin-top: 12px;
      padding-top: 12px;
      font-weight: 800;
      font-size: 1.1rem;
    }

    .cart-actions {
      margin-top: 16px;
      display: grid;
      gap: 10px;
    }

    .cart-actions .btn {
      width: 100%;
      min-height: 48px;
      font-size: 1rem;
      letter-spacing: 0.01em;
    }

    .cart-actions .btn:active {
      transform: translateY(1px) scale(0.99);
    }

    .cart-actions .btn:focus-visible {
      outline: 3px solid rgba(22, 167, 255, 0.35);
      outline-offset: 2px;
    }

    .cart-empty {
      color: var(--muted);
    }

    @media (max-width: 900px) {
      .cart-layout {
        grid-template-columns: 1fr;
      }
    }
  </style>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const STRIPE_PAYMENT_LINK = "https://buy.stripe.com/fZubIU2Hz3Ob1B12LV4ZG00";
    const CHECKOUT_ENDPOINT = "https://lixby-production.up.railway.app/create-checkout-session";
    const SUCCESS_URL = new URL("thank-you.html", window.location.href).toString();
    const CANCEL_URL = window.location.href;

    const PRICES = {
      negro: "price_1T9gzS4JmdPA7hphzMXa8s7T",
      blanco: "price_1TD6xx4JmdPA7hphNSWAJLJM",
      lixsafe: "price_1TD70q4JmdPA7hphQ9KJNOXV",
      lixsafe_plus: "price_1TD71L4JmdPA7hphdYbs0z0i"
    };

    const firebaseConfig = {
      apiKey: "AIzaSyCPU-jsIupu3lsRrknmlv04A3YnBwXeePU",
      authDomain: "lixby0.firebaseapp.com",
      projectId: "lixby0",
      storageBucket: "lixby0.firebasestorage.app",
      messagingSenderId: "1058088945026",
      appId: "1:1058088945026:web:c56eaa9c71f1ca625fbb9b",
      measurementId: "G-689VDV93C2"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    let authReady = false;
    let isAuthenticated = false;

    onAuthStateChanged(auth, (user) => {
      authReady = true;
      isAuthenticated = Boolean(user);
    });

    const CART_KEY = "lixbyCart";
    const LAST_ORDER_KEY = "lixbyLastOrder";

    const productCatalog = {
      "lixbuds-one": {
        id: "lixbuds-one",
        name: "LixBuds One",
        price: 99.99,
        image: "images/lixbuds-product.jpg"
      }
    };

    const cartListEl = document.getElementById("cartList");
    const subtotalEl = document.getElementById("subtotal");
    const totalEl = document.getElementById("total");
    const clearCartBtn = document.getElementById("clearCartBtn");
    const checkoutBtn = document.getElementById("checkoutBtn");
    let appliedGiftCard = null;

    function readCart() {
      const cart = JSON.parse(localStorage.getItem(CART_KEY) || "[]");
      let changed = false;
      const normalized = cart.map((entry) => {
        const lineId = entry.lineId || buildLineId(entry);
        if (!entry.lineId || entry.lineId !== lineId) {
          changed = true;
        }
        return { ...entry, lineId };
      });
      if (changed) {
        writeCart(normalized);
      }
      return normalized;
    }

    function writeCart(cart) {
      localStorage.setItem(CART_KEY, JSON.stringify(cart));
    }

    function buildLineId(entry) {
      const id = entry.id || "item";
      const color = entry.color || "—";
      const plan = entry.insurancePlan || "No LixSafe";
      const price = Number(entry.insurancePrice) || 0;
      return `${id}|${color}|${plan}|${price}`;
    }

    function resolveBasePrice(entry, product) {
      const raw = Number(entry.price);
      const productPrice = Number(product.price) || 0;
      const insurancePrice = Number(entry.insurancePrice) || 0;
      if (!Number.isNaN(raw) && raw > 0) {
        if (insurancePrice > 0 && Math.abs(raw - (productPrice + insurancePrice)) < 0.01) {
          return raw - insurancePrice;
        }
        return raw;
      }
      return productPrice;
    }

    function money(value) {
      const amount = Number(value) || 0;
      return `${amount.toFixed(2).replace(".", ",")} €`;
    }

    function normalizeImagePath(path) {
      if (!path) return "";
      return path.replace(/^(\.\.\/)+/, "");
    }

    function generateOrderId() {
      const now = new Date();
      const yyyy = now.getFullYear();
      const mm = String(now.getMonth() + 1).padStart(2, "0");
      const dd = String(now.getDate()).padStart(2, "0");
      const rand = Math.floor(1000 + Math.random() * 9000);
      return `LX-${yyyy}${mm}${dd}-${rand}`;
    }

    function normalizeColorKey(value) {
      if (!value) return null;
      const normalized = String(value).toLowerCase();
      if (normalized.includes("negro") || normalized.includes("black")) return "negro";
      if (normalized.includes("blanco") || normalized.includes("white")) return "blanco";
      return null;
    }

    function resolveProductPriceId(item) {
      const colorKey =
        normalizeColorKey(item.color) ||
        normalizeColorKey(item.name) ||
        normalizeColorKey(item.id);
      return PRICES[colorKey || "blanco"];
    }

    function resolveInsurancePriceId(plan) {
      if (!plan) return null;
      const normalized = String(plan).toLowerCase().trim();
      if (normalized === "no lixsafe" || normalized === "sin seguro") return null;
      if (normalized.includes("lixsafe+") || normalized.includes("plus")) {
        return PRICES.lixsafe_plus;
      }
      if (normalized === "lixsafe") {
        return PRICES.lixsafe;
      }
      return null;
    }

    function buildCheckoutItems(items) {
      if (!Array.isArray(items)) return [];
      const lineItems = [];
      items.forEach((item) => {
        const quantity = Math.max(1, Number(item.qty) || 1);
        const productPriceId = resolveProductPriceId(item);
        if (productPriceId) {
          lineItems.push({ priceId: productPriceId, quantity });
        }
        const insurancePriceId = resolveInsurancePriceId(item.insurancePlan);
        if (insurancePriceId) {
          lineItems.push({ priceId: insurancePriceId, quantity });
        }
      });
      return lineItems;
    }

    function calculateSummary(cart) {
      let subtotal = 0;
      const items = cart.map((entry) => {
        const product = productCatalog[entry.id] || {
          id: entry.id,
          name: entry.name || "Product",
          price: Number(entry.price) || 0,
          image: "images/lixbuds-hero.jpg"
        };
        const basePrice = resolveBasePrice(entry, product);
        const insurancePrice = Number(entry.insurancePrice) || 0;
        const qty = Number(entry.qty) || 1;
        const unitPrice = basePrice + insurancePrice;
        const lineTotal = unitPrice * qty;
        subtotal += lineTotal;

        return {
          id: product.id,
          name: product.name,
          price: basePrice,
          lineId: entry.lineId || buildLineId(entry),
          color: entry.color || "—",
          qty,
          unitPrice,
          lineTotal,
          insurancePlan: entry.insurancePlan || "No LixSafe",
          insurancePrice
        };
      });

      if (appliedGiftCard) {
        const discount = Math.min(appliedGiftCard.balance, subtotal);
        subtotal = Math.max(0, subtotal - discount);
      }

      return { items, subtotal };
    }

    function updateQuantity(lineId, delta) {
      const cart = readCart();
      const item = cart.find((entry) => (entry.lineId || buildLineId(entry)) === lineId);
      if (!item) return;

      item.qty += delta;
      if (item.qty <= 0) {
        const next = cart.filter((entry) => (entry.lineId || buildLineId(entry)) !== lineId);
        writeCart(next);
      } else {
        writeCart(cart);
      }

      renderCart();
    }

    function removeItem(lineId) {
      const next = readCart().filter((entry) => (entry.lineId || buildLineId(entry)) !== lineId);
      writeCart(next);
      renderCart();
    }

    function renderCart() {
      const cart = readCart();

      if (cart.length === 0) {
        cartListEl.innerHTML = `<p class="cart-empty">Your cart is empty. <a href="tienda.html">Go to store</a>.</p>`;
        subtotalEl.textContent = money(0);
        totalEl.textContent = money(0);
        return;
      }

      let subtotal = 0;

      cartListEl.innerHTML = cart.map((entry) => {
        const product = productCatalog[entry.id] || {
          id: entry.id,
          name: entry.name || "Product",
          price: Number(entry.price) || 0,
          image: "images/lixbuds-hero.jpg"
        };

        const basePrice = resolveBasePrice(entry, product);
        const insurancePrice = Number(entry.insurancePrice) || 0;
        const qty = Number(entry.qty) || 1;
        const unitPrice = basePrice + insurancePrice;
        const lineTotal = unitPrice * qty;
        subtotal += lineTotal;

        const insurancePlan = entry.insurancePlan || "No LixSafe";
        const color = entry.color || "—";
        const insuranceLabel = insurancePlan === "No LixSafe" ? "No LixSafe" : `${insurancePlan} (+${money(insurancePrice)})`;
        const baseName = entry.name || product.name || "Product";
        let displayName = baseName;
        if (color !== "—") {
          const escapedColor = color.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
          displayName = baseName
            .replace(new RegExp(`\\s*\\(${escapedColor}\\)\\s*$`, "i"), "")
            .replace(new RegExp(`\\s+${escapedColor}\\s*$`, "i"), "")
            .trim();
        }
        if (!displayName) {
          displayName = baseName;
        }
        const productImage = normalizeImagePath(entry.image || product.image);

        return `
          <article class="cart-item">
            <img class="cart-item-image" src="${productImage}" alt="${displayName}">
            <div>
              <h3>${displayName}</h3>
              <p>${money(unitPrice)} / unit</p>
              <p class="cart-item-meta">Color: ${color}</p>
              <p class="cart-item-meta">LixSafe: ${insuranceLabel}</p>
              <div class="cart-controls">
                <button type="button" data-action="minus" data-id="${entry.lineId}">-</button>
                <span>${qty}</span>
                <button type="button" data-action="plus" data-id="${entry.lineId}">+</button>
              </div>
              <button type="button" class="cart-remove" data-action="remove" data-id="${entry.lineId}">Remove</button>
            </div>
            <div class="cart-item-total">${money(lineTotal)}</div>
          </article>
        `;
      }).join("");

      subtotalEl.textContent = money(subtotal);
      let total = subtotal;
      if (appliedGiftCard) {
        const discount = Math.min(appliedGiftCard.balance, subtotal);
        total = Math.max(0, subtotal - discount);
      }
      totalEl.textContent = money(total);
    }

    cartListEl.addEventListener("click", (event) => {
      const target = event.target;
      if (!(target instanceof HTMLElement)) return;

      const action = target.getAttribute("data-action");
      const lineId = target.getAttribute("data-id");
      if (!action || !lineId) return;

      if (action === "plus") updateQuantity(lineId, 1);
      if (action === "minus") updateQuantity(lineId, -1);
      if (action === "remove") removeItem(lineId);
    });

    clearCartBtn.addEventListener("click", () => {
      localStorage.removeItem(CART_KEY);
      renderCart();
    });

    const applyGiftBtn = document.getElementById("applyGiftBtn");
    if (applyGiftBtn) {
      applyGiftBtn.addEventListener("click", async () => {
        const codeInput = document.getElementById("giftCodeInput");
        const msg = document.getElementById("giftCardMsg");
        if (!codeInput || !msg) return;

        const code = codeInput.value.trim().toUpperCase();
        if (!code) return;

        applyGiftBtn.disabled = true;
        applyGiftBtn.textContent = "...";

        try {
          const res = await fetch("https://lixby-production.up.railway.app/redeem-gift-card", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ code })
          });
          const data = await res.json();

          if (!res.ok || !data.valid) {
            msg.style.color = "#ef4444";
            msg.textContent = "❌ " + (data.error || "Invalid code");
            msg.style.display = "block";
            appliedGiftCard = null;
          } else {
            appliedGiftCard = data;
            msg.style.color = "#458500";
            msg.textContent = `✅ Gift card applied — ${data.balance
              .toFixed(2)
              .replace(".", ",")} € balance remaining`;
            msg.style.display = "block";
            renderCart();
          }
        } catch (e) {
          msg.style.color = "#ef4444";
          msg.textContent = "❌ Error verifying code";
          msg.style.display = "block";
        } finally {
          applyGiftBtn.disabled = false;
          applyGiftBtn.textContent = "Apply";
        }
      });
    }

    checkoutBtn.addEventListener("click", async () => {
      const cart = readCart();
      if (cart.length === 0) {
        alert("Your cart is empty.");
        return;
      }

      checkoutBtn.disabled = true;
      const originalCheckoutLabel = checkoutBtn.textContent;
      checkoutBtn.textContent = "Processing...";

      if (!authReady) {
        alert("Loading session. Please try again in a few seconds.");
        checkoutBtn.disabled = false;
        checkoutBtn.textContent = originalCheckoutLabel;
        return;
      }

      if (!isAuthenticated) {
        checkoutBtn.disabled = false;
        checkoutBtn.textContent = originalCheckoutLabel;
        window.location.href = "sign-in.html";
        return;
      }

      const orderId = generateOrderId();
      const summary = calculateSummary(cart);
      const orderPayload = {
        orderId,
        status: "pending_payment",
        paymentStatus: "pending",
        currency: "EUR",
        subtotal: Number(summary.subtotal.toFixed(2)),
        items: summary.items,
        createdAt: serverTimestamp(),
        uid: auth.currentUser?.uid || null
      };

      localStorage.setItem(LAST_ORDER_KEY, JSON.stringify({
        orderId,
        status: orderPayload.status,
        currency: orderPayload.currency,
        subtotal: orderPayload.subtotal,
        items: orderPayload.items
      }));

      try {
        await addDoc(collection(db, "orders"), orderPayload);
      } catch (error) {
        console.log("Order save failed", error);
      }

      try {
        // Read saved profile
        const profile = JSON.parse(localStorage.getItem("lixbyProfile") || "{}");
        const customerName = profile.firstName
          ? `${profile.firstName} ${profile.lastName || ""}`.trim()
          : null;

        const checkoutItems = buildCheckoutItems(summary.items);
        const itemsForCheckout = checkoutItems.length ? checkoutItems : summary.items;
        const response = await fetch(CHECKOUT_ENDPOINT, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            orderId,
            successUrl: SUCCESS_URL,
            cancelUrl: CANCEL_URL,
            items: itemsForCheckout,
            giftCardCode: appliedGiftCard ? appliedGiftCard.code : null,
            customerEmail: profile.email || auth.currentUser?.email || null,
            customerName,
            customerPhone: profile.phone || null
          })
        });
        const data = await response.json();
        if (response.ok && data.url) {
          window.location.href = data.url;
          return;
        }
      } catch (error) {
        console.log("Checkout session failed", error);
      }

      checkoutBtn.disabled = false;
      checkoutBtn.textContent = originalCheckoutLabel;
      window.location.href = STRIPE_PAYMENT_LINK;
    });

    renderCart();
  </script>
