<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>E-mail verificado | Lixby</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    .verify-page {
      padding: 40px 0 84px;
      min-height: 70vh;
      display: grid;
      place-items: center;
    }

    .verify-card {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 18px;
      box-shadow: var(--shadow-soft);
      padding: 22px;
      max-width: 520px;
      text-align: center;
      display: grid;
      gap: 12px;
    }

    .verify-card p {
      color: var(--muted);
    }

    .verify-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }
  </style>
  <link rel="icon" href="/favicon.ico">
  <link rel="apple-touch-icon" href="/icon.png">
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Lixby",
      "url": "https://www.lixby.es",
      "logo": "https://www.lixby.es/logo.png",
      "sameAs": [
        "https://github.com/lixby"
      ]
    }
  </script>
</head>
<body>
  <header class="nav" id="nav">
    <div class="container nav-container">
      <a href="./" class="nav-brand">Lixby</a>
      <nav class="nav-links" aria-label="Principal">
        <a href="tienda.html" class="nav-link">Loja</a>
        <a href="index.html#productos" class="nav-link">Produtos</a>
        <a href="index.html#apps" class="nav-link">Apps</a>
        <a href="pages/support.html" class="nav-link">Suporte</a>
      </nav>
      <div class="nav-actions">
        <a href="cesta.html" class="nav-icon-link" aria-label="Carrinho">
          <img src="images/Bolsa.png" alt="Carrinho">
        </a>
        <a href="conta.html" class="nav-icon-link" aria-label="Conta">
          <img src="images/cuenta.png" alt="Conta">
        </a>
      </div>
    </div>
  </header>

  <main class="container verify-page">
    <section class="verify-card">
      <h1>E-mail verificado</h1>
      <p>O seu e-mail foi verificado com sucesso.</p>
      <div class="verify-actions">
        <a class="btn btn-primary" href="conta.html">Ir para minha conta</a>
        <a class="btn btn-secondary" href="Conecte-se.html">Iniciar sessão</a>
      </div>
    </section>
  </main>
</body>
</html>
