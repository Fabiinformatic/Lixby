  <main class="container password-page">
    <div id="statusMsg" class="status-msg"></div>

    <section class="password-card">
      <h1>Alterar palavra-passe</h1>
      <p class="helper">Por razões de segurança, pedimos a sua palavra-passe atual.</p>

      <div class="field">
        <label for="currentPassword">Palavra-passe atual</label>
        <input id="currentPassword" type="password" autocomplete="current-password">
      </div>
      <div class="field">
        <label for="newPassword">Nova palavra-passe</label>
        <input id="newPassword" type="password" autocomplete="new-password">
      </div>
      <div class="field">
        <label for="confirmPassword">Confirmar nova palavra-passe</label>
        <input id="confirmPassword" type="password" autocomplete="new-password">
      </div>

      <div class="actions">
        <button id="savePasswordBtn" class="btn btn-primary" type="button">Guardar alterações</button>
        <a class="btn btn-secondary" href="conta.html">Voltar à minha conta</a>
      </div>
    </section>
  </main>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, onAuthStateChanged, updatePassword, EmailAuthProvider, reauthenticateWithCredential } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCPU-jsIupu3lsRrknmlv04A3YnBwXeePU",
      authDomain: "lixby0.firebaseapp.com",
      projectId: "lixby0",
      storageBucket: "lixby0.firebasestorage.app",
      messagingSenderId: "1058088945026",
      appId: "1:1058088945026:web:c56eaa9c71f1ca625fbb9b",
      measurementId: "G-689VDV93C2"
    };

    const statusMsg = document.getElementById("statusMsg");
    const currentPassword = document.getElementById("currentPassword");
    const newPassword = document.getElementById("newPassword");
    const confirmPassword = document.getElementById("confirmPassword");
    const savePasswordBtn = document.getElementById("savePasswordBtn");

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    function showStatus(text, type = "") {
      statusMsg.textContent = text;
      statusMsg.className = `status-msg ${type}`.trim();
    }

    function clearInputs() {
      currentPassword.value = "";
      newPassword.value = "";
      confirmPassword.value = "";
    }

    function isStrongEnough(value) {
      return value.length >= 8;
    }

    onAuthStateChanged(auth, (user) => {
      if (!user) {
        window.location.href = "Conecte-se.html";
      }
    });

    savePasswordBtn.addEventListener("click", async () => {
      const user = auth.currentUser;
      if (!user || !user.email) {
        showStatus("Sessão inválida.", "error");
        return;
      }

      const current = currentPassword.value.trim();
      const next = newPassword.value.trim();
      const confirm = confirmPassword.value.trim();

      if (!current) {
        showStatus("Introduza a palavra-passe atual.", "error");
        return;
      }

      if (!isStrongEnough(next)) {
        showStatus("A nova palavra-passe deve ter pelo menos 8 caracteres.", "error");
        return;
      }

      if (next !== confirm) {
        showStatus("As palavras-passe não coincidem.", "error");
        return;
      }

      try {
        const credential = EmailAuthProvider.credential(user.email, current);
        await reauthenticateWithCredential(user, credential);
        await updatePassword(user, next);
        clearInputs();
        showStatus("Palavra-passe atualizada com sucesso.", "success");
      } catch (error) {
        showStatus(`Não foi possível atualizar: ${error.message}`, "error");
      }
    });
  </script>
