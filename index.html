<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lixby</title>
  <meta name="description" content="Lixby multilingual entry point">
</head>
<body>
  <noscript>
    <p>JavaScript is required for automatic language redirect.</p>
    <p><a href="./en/index.html">English</a> | <a href="./es/index.html">Espanol</a> | <a href="./pt/index.html">Portugues</a></p>
  </noscript>
  <script>
    (function () {
      const lang = (navigator.language || navigator.userLanguage || "en").toLowerCase();
      let folder = "en";

      if (lang.startsWith("es")) folder = "es";
      else if (lang.startsWith("pt")) folder = "pt";
      else if (lang.startsWith("en")) folder = "en";

      window.location.replace(`./${folder}/index.html`);
    })();
  </script>
</body>
</html>
