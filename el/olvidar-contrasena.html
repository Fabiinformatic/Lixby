  <main class="container password-page">
    <div id="statusMsg" class="status-msg"></div>

    <section class="password-card">
      <h1>Ξεχάσατε τον κωδικό σας;</h1>
      <p class="helper">Εισάγετε το email σας και θα σας στείλουμε έναν σύνδεσμο για επαναφορά.</p>

      <div class="field">
        <label for="resetEmail">Διεύθυνση email</label>
        <input id="resetEmail" type="email" autocomplete="email" placeholder="όνομα@παράδειγμα.com">
      </div>

      <div class="actions">
        <button id="sendResetBtn" class="btn btn-primary" type="button">Αποστολή email</button>
        <a class="btn btn-secondary" href="iniciar-sesion.html">Επιστροφή στη σύνδεση</a>
      </div>
    </section>
  </main>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCPU-jsIupu3lsRrknmlv04A3YnBwXeePU",
      authDomain: "lixby0.firebaseapp.com",
      projectId: "lixby0",
      storageBucket: "lixby0.firebasestorage.app",
      messagingSenderId: "1058088945026",
      appId: "1:1058088945026:web:c56eaa9c71f1ca625fbb9b",
      measurementId: "G-689VDV93C2"
    };

    const statusMsg = document.getElementById("statusMsg");
    const resetEmail = document.getElementById("resetEmail");
    const sendResetBtn = document.getElementById("sendResetBtn");

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    function showStatus(text, type = "") {
      statusMsg.textContent = text;
      statusMsg.className = `status-msg ${type}`.trim();
    }

    function isValidEmail(value) {
      return value.includes("@");
    }

    sendResetBtn.addEventListener("click", async () => {
      const email = resetEmail.value.trim();
      if (!isValidEmail(email)) {
        showStatus("Εισάγετε μια έγκυρη διεύθυνση email.", "error");
        return;
      }

      try {
        sendResetBtn.disabled = true;
        const response = await fetch("https://sendpasswordreset-dtoucjpwkq-uc.a.run.app", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email })
        });

        if (!response.ok) {
          const data = await response.json().catch(() => ({}));
          throw new Error(data.error || "Δεν ήταν δυνατή η αποστολή του email");
        }
        showStatus("Σας στείλαμε ένα email. Ελέγξτε τα εισερχόμενά σας.", "success");
      } catch (error) {
        showStatus(`Δεν ήταν δυνατή η αποστολή του email: ${error.message}`, "error");
      } finally {
        sendResetBtn.disabled = false;
      }
    });
  </script>
