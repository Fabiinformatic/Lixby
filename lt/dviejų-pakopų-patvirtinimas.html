  <main class="container twofa-page">
    <div id="statusMsg" class="status-msg"></div>

    <section class="twofa-card">
      <h1>2 žingsnių patvirtinimas</h1>
      <p class="helper">Suaktyvinkite papildomą saugumo sluoksnį savo paskyrai naudodami SMS.</p>

      <div class="field-grid">
        <div class="field">
          <label for="phoneNumber">Telefono numeris</label>
          <input id="phoneNumber" type="tel" placeholder="+370 600 00000">
        </div>
        <div class="field">
          <label for="currentPassword">Dabartinis slaptažodis</label>
          <input id="currentPassword" type="password" autocomplete="current-password">
        </div>
        <div class="field">
          <label for="smsCode">SMS kodas</label>
          <input id="smsCode" type="text" inputmode="numeric" maxlength="6" placeholder="123456">
        </div>
      </div>

      <div class="recaptcha-wrap">
        <div id="recaptcha-container"></div>
        <p class="inline-note">Norėdami išsiųsti SMS, turite išspręsti reCAPTCHA.</p>
      </div>

      <div class="actions">
        <button id="sendCodeBtn" class="btn btn-secondary" type="button">Siųsti kodą</button>
        <button id="verifyEnrollBtn" class="btn btn-primary" type="button">Patvirtinti ir aktyvuoti</button>
        <a class="btn btn-secondary" href="sąskaitą.html">Grįžti į paskyrą</a>
      </div>
    </section>
  </main>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
      getAuth,
      onAuthStateChanged,
      EmailAuthProvider,
      reauthenticateWithCredential,
      RecaptchaVerifier,
      PhoneAuthProvider,
      PhoneMultiFactorGenerator,
      multiFactor
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCPU-jsIupu3lsRrknmlv04A3YnBwXeePU",
      authDomain: "lixby0.firebaseapp.com",
      projectId: "lixby0",
      storageBucket: "lixby0.firebasestorage.app",
      messagingSenderId: "1058088945026",
      appId: "1:1058088945026:web:c56eaa9c71f1ca625fbb9b",
      measurementId: "G-689VDV93C2"
    };

    const statusMsg = document.getElementById("statusMsg");
    const phoneNumber = document.getElementById("phoneNumber");
    const currentPassword = document.getElementById("currentPassword");
    const smsCode = document.getElementById("smsCode");
    const sendCodeBtn = document.getElementById("sendCodeBtn");
    const verifyEnrollBtn = document.getElementById("verifyEnrollBtn");

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    let recaptchaVerifier = null;
    let verificationId = "";

    function showStatus(text, type = "") {
      statusMsg.textContent = text;
      statusMsg.className = `status-msg ${type}`.trim();
    }

    function initRecaptcha() {
      if (recaptchaVerifier) return;
      recaptchaVerifier = new RecaptchaVerifier(auth, "recaptcha-container", {
        size: "normal"
      });
      recaptchaVerifier.render();
    }

    function getPhoneFactor(user) {
      const enrolled = multiFactor(user).enrolledFactors;
      return enrolled.find((factor) => factor.factorId === PhoneMultiFactorGenerator.FACTOR_ID) || null;
    }

    async function reauthUser(user) {
      const password = currentPassword.value.trim();
      if (!password) {
        showStatus("Įveskite dabartinį slaptažodį, kad tęstumėte.", "error");
        throw new Error("missing-password");
      }
      if (!user.email) {
        showStatus("Naudotojas neturi el. pašto pakartotiniam autentifikavimui.", "error");
        throw new Error("missing-email");
      }
      const credential = EmailAuthProvider.credential(user.email, password);
      await reauthenticateWithCredential(user, credential);
    }

    function normalizePhone(value) {
      const raw = value.trim();
      if (!raw) return "";
      return raw.startsWith("+") ? raw : "";
    }

    onAuthStateChanged(auth, (user) => {
      if (!user) {
        window.location.href = "prisijungti.html";
        return;
      }
      initRecaptcha();
      if (!user.emailVerified) {
        showStatus("Prieš aktyvuodami 2FA patvirtinkite savo el. paštą.", "error");
        sendCodeBtn.disabled = true;
        verifyEnrollBtn.disabled = true;
      }
      const factor = getPhoneFactor(user);
      if (factor) {
        showStatus(`2FA aktyvus su ${factor.phoneNumber || "telefonu"}.`, "success");
      } else {
        showStatus("2FA nėra aktyvuota šioje paskyroje.");
      }
    });

    function toggleVerifyButton() {
      const hasCode = smsCode.value.trim().length > 0;
      verifyEnrollBtn.style.display = hasCode ? "inline-flex" : "none";
    }

    toggleVerifyButton();
    smsCode.addEventListener("input", toggleVerifyButton);

    sendCodeBtn.addEventListener("click", async () => {
      const user = auth.currentUser;
      if (!user) {
        showStatus("Neteisė sesija.", "error");
        return;
      }

      if (!user.emailVerified) {
        showStatus("Prieš aktyvuodami 2FA patvirtinkite savo el. paštą.", "error");
        return;
      }

      const phone = normalizePhone(phoneNumber.value);
      if (!phone) {
        showStatus("Įveskite numerį tarptautiniu formatu (pvz., +370...).", "error");
        return;
      }

      try {
        sendCodeBtn.disabled = true;
        const originalText = sendCodeBtn.textContent;
        sendCodeBtn.textContent = "Siunčiama...";
        showStatus("Siunčiamas kodas...", "info");
        await reauthUser(user);
        const multiFactorSession = await multiFactor(user).getSession();
        const phoneInfoOptions = {
          phoneNumber: phone,
          session: multiFactorSession
        };
        const phoneAuthProvider = new PhoneAuthProvider(auth);
        verificationId = await phoneAuthProvider.verifyPhoneNumber(phoneInfoOptions, recaptchaVerifier);
        showStatus("Kodas išsiųstas SMS žinute.", "success");
      } catch (error) {
        recaptchaVerifier?.clear();
        recaptchaVerifier = null;
        initRecaptcha();
        const message = error?.message || error?.code || String(error);
        console.error("SMS klaida:", error);
        showStatus(`Nepavyko išsiųsti SMS: ${message}`, "error");
      } finally {
        sendCodeBtn.disabled = false;
        sendCodeBtn.textContent = "Siųsti kodą";
      }
    });

    verifyEnrollBtn.addEventListener("click", async () => {
      const user = auth.currentUser;
      if (!user) {
        showStatus("Neteisė sesija.", "error");
        return;
      }

      if (!verificationId) {
        showStatus("Pirmiausia išsiųskite SMS kodą.", "error");
        return;
      }

      const code = smsCode.value.trim();
      if (!code) {
        showStatus("Įveskite SMS kodą.", "error");
        return;
      }

      try {
        verifyEnrollBtn.disabled = true;
        const originalText = verifyEnrollBtn.textContent;
        verifyEnrollBtn.textContent = "Tikrinama...";
        showStatus("Tikrinamas kodas...", "info");
        const cred = PhoneAuthProvider.credential(verificationId, code);
        const assertion = PhoneMultiFactorGenerator.assertion(cred);
        await multiFactor(user).enroll(assertion, "Telefonas");
        showStatus("2 žingsnių patvirtinimas aktyvuotas.", "success");
        verificationId = "";
        smsCode.value = "";
        toggleVerifyButton();
        setTimeout(() => {
          window.location.href = "sąskaitą.html";
        }, 900);
      } catch (error) {
        const message = error?.message || error?.code || String(error);
        console.error("2FA įtraukimo klaida:", error);
        showStatus(`Nepavyko aktyvuoti 2FA: ${message}`, "error");
      } finally {
        verifyEnrollBtn.disabled = false;
        verifyEnrollBtn.textContent = "Patvirtinti ir aktyvuoti";
      }
    });

    // Išjungimo mygtukas pašalintas pagal prašymą.
  </script>
