  <main class="container password-page">
    <div id="statusMsg" class="status-msg"></div>

    <section class="password-card">
      <h1>Keisti slaptažodį</h1>
      <p class="helper">Saugumo sumetimais prašome įvesti dabartinį slaptažodį.</p>

      <div class="field">
        <label for="currentPassword">Dabartinis slaptažodis</label>
        <input id="currentPassword" type="password" autocomplete="current-password">
      </div>
      <div class="field">
        <label for="newPassword">Naujas slaptažodis</label>
        <input id="newPassword" type="password" autocomplete="new-password">
      </div>
      <div class="field">
        <label for="confirmPassword">Pakartokite naują slaptažodį</label>
        <input id="confirmPassword" type="password" autocomplete="new-password">
      </div>

      <div class="actions">
        <button id="savePasswordBtn" class="btn btn-primary" type="button">Išsaugoti pakeitimus</button>
        <a class="btn btn-secondary" href="sąskaitą.html">Grįžti į paskyrą</a>
      </div>
    </section>
  </main>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, onAuthStateChanged, updatePassword, EmailAuthProvider, reauthenticateWithCredential } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCPU-jsIupu3lsRrknmlv04A3YnBwXeePU",
      authDomain: "lixby0.firebaseapp.com",
      projectId: "lixby0",
      storageBucket: "lixby0.firebasestorage.app",
      messagingSenderId: "1058088945026",
      appId: "1:1058088945026:web:c56eaa9c71f1ca625fbb9b",
      measurementId: "G-689VDV93C2"
    };

    const statusMsg = document.getElementById("statusMsg");
    const currentPassword = document.getElementById("currentPassword");
    const newPassword = document.getElementById("newPassword");
    const confirmPassword = document.getElementById("confirmPassword");
    const savePasswordBtn = document.getElementById("savePasswordBtn");

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    function showStatus(text, type = "") {
      statusMsg.textContent = text;
      statusMsg.className = `status-msg ${type}`.trim();
    }

    function clearInputs() {
      currentPassword.value = "";
      newPassword.value = "";
      confirmPassword.value = "";
    }

    function isStrongEnough(value) {
      return value.length >= 8;
    }

    onAuthStateChanged(auth, (user) => {
      if (!user) {
        window.location.href = "prisijungti.html";
      }
    });

    savePasswordBtn.addEventListener("click", async () => {
      const user = auth.currentUser;
      if (!user || !user.email) {
        showStatus("Neteisinga sesija.", "error");
        return;
      }

      const current = currentPassword.value.trim();
      const next = newPassword.value.trim();
      const confirm = confirmPassword.value.trim();

      if (!current) {
        showStatus("Įveskite dabartinį slaptažodį.", "error");
        return;
      }

      if (!isStrongEnough(next)) {
        showStatus("Naujas slaptažodis turi turėti bent 8 simbolius.", "error");
        return;
      }

      if (next !== confirm) {
        showStatus("Slaptažodžiai nesutampa.", "error");
        return;
      }

      try {
        const credential = EmailAuthProvider.credential(user.email, current);
        await reauthenticateWithCredential(user, credential);
        await updatePassword(user, next);
        clearInputs();
        showStatus("Slaptažodis sėkmingai atnaujintas.", "success");
      } catch (error) {
        showStatus(`Nepavyko atnaujinti: ${error.message}`, "error");
      }
    });
  </script>
